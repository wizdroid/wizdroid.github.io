<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f12;
            --surface-color: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f2f5;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(88, 166, 255, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(138, 43, 226, 0.04) 0%, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 4rem;
            padding-top: 2rem;
            animation: fadeInDown 0.8s var(--transition);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #8b949e);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            b1.10032026.meita.png margin-bottom: 3rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeIn 1s var(--transition);
        }

        .tab-btn {
            background: var(--surface-color);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 0.75rem 1.5rem;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 400;
            border-radius: 100px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s var(--transition);
            text-transform: capitalize;
        }

        .tab-btn:hover {
            background: var(--surface-hover);
            color: var(--text-primary);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .tab-btn.active {
            background: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.15);
        }

        .gallery {
            column-count: 1;
            column-gap: 1.5rem;
            padding-bottom: 4rem;
        }

        @media (min-width: 640px) {
            .gallery {
                column-count: 2;
            }
        }

        @media (min-width: 1024px) {
            .gallery {
                column-count: 3;
            }
        }

        @media (min-width: 1400px) {
            .gallery {
                column-count: 4;
            }
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            border-radius: 16px;
            overflow: hidden;
            background: var(--surface-color);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            position: relative;
            transform-origin: center;
            transition: all 0.4s var(--transition);
            opacity: 0;
            transform: translateY(20px);
            animation: itemFadeIn 0.6s var(--transition) forwards;
        }

        @keyframes itemFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gallery-item:hover {
            transform: scale(1.02) translateY(-5px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: var(--glass-shadow);
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.6s var(--transition);
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 1rem 1rem;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 100%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            font-weight: 300;
            text-align: right;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s var(--transition);
            letter-spacing: 1px;
        }

        .gallery-item:hover .gallery-caption {
            opacity: 1;
            transform: translateY(0);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            animation: modalFadeIn 0.4s var(--transition);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-content {
            position: relative;
            max-width: 90vw;
            max-height: 85vh;
            animation: modalScale 0.4s var(--transition);
        }

        @keyframes modalScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-caption {
            position: absolute;
            bottom: -3rem;
            left: 0;
            right: 0;
            text-align: center;
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 300;
        }

        .close-btn {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: var(--text-secondary);
            font-size: 2rem;
            line-height: 1;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1001;
            padding: 0.5rem;
            border-radius: 50%;
            background: var(--surface-color);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
        }

        .close-btn:hover {
            color: white;
            background: var(--surface-hover);
            transform: rotate(90deg);
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .header h1 {
                font-size: 2.5rem;
            }

            .close-btn {
                top: 1rem;
                right: 1rem;
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Gallery</h1>
        </div>

        <div class="tabs" id="tabsContainer"></div>

        <div class="gallery" id="galleryContainer"></div>

        <div class="modal" id="modal">
            <div class="close-btn" id="closeBtn">&times;</div>
            <div class="modal-content">
                <img id="modalImage" src="" alt="Gallery View">
                <div class="modal-caption" id="modalCaption"></div>
            </div>
        </div>
    </div>

    <script>
        class Gallery {
            constructor() {
                this.images = [];
                this.categories = [];
                this.currentCategory = null;
                this.init();
            }

            async init() {
                await this.loadImages();
                this.processImages();
                this.renderTabs();
                this.setupModalEvents();
                if (this.categories.length > 0) {
                    this.showCategory(this.categories[0]);
                }
            }

            async loadImages() {
                // Determine if we are on localhost to prioritize local JSON over remote GitHub API
                const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

                if (!isLocalhost) {
                    try {
                        const repoUrl = 'https://api.github.com/repos/wizdroid/wizdroid.github.io/contents/gallery?ref=main&t=' + new Date().getTime();
                        const ghResponse = await fetch(repoUrl);
                        if (ghResponse.ok) {
                            const data = await ghResponse.json();
                            const validExts = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.svg'];
                            const imageFiles = data
                                .filter(item => item.type === 'file')
                                .filter(item => {
                                    const ext = item.name.substring(item.name.lastIndexOf('.')).toLowerCase();
                                    return validExts.includes(ext);
                                })
                                .map(item => item.name);

                            if (imageFiles.length > 0) {
                                // Sort reverse to show newest first conceptually
                                this.images = imageFiles.sort().reverse();
                                return; // Successfully loaded dynamically
                            }
                        }
                    } catch (error) {
                        console.warn('Dynamic GitHub API fetch failed, falling back to local index.json', error);
                    }
                }

                // Fallback to static index.json (or primary method if on localhost)
                try {
                    const response = await fetch('gallery/index.json?_t=' + new Date().getTime()); // Prevent caching
                    if (response.ok) {
                        const data = await response.json();
                        this.images = data.images || [];
                    } else {
                        console.error('Failed to load gallery index');
                        this.images = [];
                    }
                } catch (error) {
                    console.error('Error loading images:', error);
                    this.images = [];
                }
            }

            parseFilename(filename) {
                // Expected format: prefix.DDMMYYYY.category.extension
                const parts = filename.replace(/\.[^/.]+$/, '').split('.');

                if (parts.length >= 3) {
                    const dateStr = parts[1];
                    const category = parts[2];

                    if (dateStr.length === 8) {
                        const day = dateStr.substring(0, 2);
                        const month = dateStr.substring(2, 4);
                        const year = dateStr.substring(4, 8);
                        const displayDate = `${day}.${month}.${year}`;

                        // Parse safely to YYYY-MM-DD for sorting
                        const dateObj = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));

                        return { category, displayDate, dateObj, filename };
                    }
                }
                return null;
            }

            processImages() {
                const parsed = this.images
                    .map(filename => this.parseFilename(filename))
                    .filter(img => img !== null);

                // Sort descending by date
                parsed.sort((a, b) => b.dateObj - a.dateObj);

                this.images = parsed;
                this.categories = [...new Set(this.images.map(img => img.category))].sort();
            }

            renderTabs() {
                const container = document.getElementById('tabsContainer');
                container.innerHTML = '';

                this.categories.forEach(category => {
                    const btn = document.createElement('button');
                    btn.className = 'tab-btn';
                    btn.textContent = category;
                    btn.onclick = () => this.showCategory(category);
                    container.appendChild(btn);
                });
            }

            showCategory(category) {
                this.currentCategory = category;

                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.textContent === category);
                });

                const filtered = this.images.filter(img => img.category === category);
                this.renderGallery(filtered);
            }

            renderGallery(images) {
                const container = document.getElementById('galleryContainer');
                container.innerHTML = '';

                if (images.length === 0) {
                    container.innerHTML = '<div class="empty-state">No images to display</div>';
                    return;
                }

                images.forEach((img, idx) => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.style.animationDelay = `${idx * 0.05}s`;
                    item.innerHTML = `
                        <img src="gallery/${img.filename}" alt="${img.category}">
                        <div class="gallery-caption">${img.displayDate}</div>
                    `;
                    item.onclick = () => this.openModal(img);
                    container.appendChild(item);
                });
            }

            openModal(img) {
                const modal = document.getElementById('modal');
                const modalImg = document.getElementById('modalImage');
                const caption = document.getElementById('modalCaption');

                modalImg.src = `gallery/${img.filename}`;
                caption.textContent = `${img.category} — ${img.displayDate}`;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            closeModal() {
                document.getElementById('modal').classList.remove('active');
                document.body.style.overflow = '';
            }

            setupModalEvents() {
                const modal = document.getElementById('modal');
                const closeBtn = document.getElementById('closeBtn');

                closeBtn.onclick = () => this.closeModal();
                modal.onclick = (e) => {
                    if (e.target === modal) this.closeModal();
                };

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') this.closeModal();
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new Gallery();
        });
    </script>
</body>

</html>
